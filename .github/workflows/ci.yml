# Workflow d'intégration continue de demo-api.
# Il s'exécute automatiquement à chaque push et à chaque pull request sur main.
# Rôle : installer les dépendances et lancer les tests. Si un test échoue,
# le workflow passe au rouge et GitHub notifie l'auteur du push.
name: CI

# Déclencheurs : quand le workflow tourne.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Machine virtuelle fournie par GitHub pour exécuter le job.
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du dépôt dans la VM.
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installe Node.js (version 20) et active le cache npm.
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Installe les dépendances de façon reproductible à partir du lockfile.
      - name: Installer les dépendances
        run: npm ci

      # 4. Lance la suite de tests. Un échec ici fait échouer tout le workflow.
      - name: Lancer les tests
        run: npm test
